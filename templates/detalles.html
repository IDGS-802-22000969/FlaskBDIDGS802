{% extends "layout.html" %}
{% block container %}

<div class="flex justify-center p-6">
    <div class="bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs">
        <div class="flex flex-col items-center">
            <img class="w-24 h-24 mb-6 rounded-full border border-brand"
                 src="https://ui-avatars.com/api/?name={{ nombre }}+{{ apaterno }}&background=random">
            <h5 class="mb-0.5 text-xl font-semibold">
                {{ nombre }} {{ apaterno }}
            </h5>
            <span class="text-sm text-body mb-4">{{ email }}</span>

<div class="w-full mt-4">
    <h6 class="text-xs font-bold text-gray-400 uppercase mb-2">Materias Inscritas:</h6>
    <div class="flex flex-col gap-2">
        {% if cursos %}
            {% for curso in cursos %}
            <div class="flex items-center bg-cyan-50 text-cyan-700 px-3 py-2 rounded-lg border border-cyan-100">
                <span class="w-2 h-2 bg-cyan-400 rounded-full mr-2"></span>
                <span class="text-sm font-medium">{{ curso.nombre }}</span>
            </div>
            {% endfor %}
        {% else %}
            <p class="text-xs text-gray-500 italic">Sin cursos inscritos.</p>
        {% endif %}
    </div>
</div>

<a href="{{ url_for('index') }}" class="mt-6 text-white bg-brand px-4 py-2 rounded-base w-full text-center">
    Regresar
</a>
        </div>
    </div>
</div>
{% endblock %}
