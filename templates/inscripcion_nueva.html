{% extends "layout.html" %}
{% block container %}

<div class="py-10 max-w-2xl mx-auto px-4">
    <h2 class="text-3xl font-extrabold text-gray-900 mb-8 text-center">Nueva Inscripción</h2>
    
    <div class="bg-white border border-gray-200 rounded-xl shadow-lg p-8">
        <form action="{{ url_for('inscripciones.inscripcionNueva') }}" method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Alumno</label>
                <select name="alumno_id" class="w-full px-4 py-2 border rounded-lg" required>
                    <option value="" disabled selected>Seleccione un alumno...</option>
                    {% for alumno in alumnos %}
                        <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apaterno }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Curso</label>
                <select name="curso_id" class="w-full px-4 py-2 border rounded-lg" required>
                    <option value="" disabled selected>Seleccione la materia...</option>
                    {% for curso in cursos %}
                        <option value="{{ curso.id }}">{{ curso.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="text-red-500 hover:text-red-700 text-xs font-bold uppercase">
                Inscribir Alumno
            </button>
        </form>
    </div>
</div>

{% endblock %}
