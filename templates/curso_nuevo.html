{% extends "layout.html" %}
{% block container %}
<div class="py-10 max-w-2xl mx-auto px-4">
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Registrar Nuevo Curso</h2>
        <p class="text-sm text-gray-500">Complete la información para dar de alta una nueva materia.</p>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
        <form action="{{ url_for('cursos.cursoNuevo') }}" method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label for="nombre" class="block text-sm font-bold text-gray-700 mb-2">Nombre del Curso</label>
                <input type="text" name="nombre" id="nombre" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    placeholder="Ej. Programación Web con Flask">
            </div>
            <div>
                <label for="descripcion" class="block text-sm font-bold text-gray-700 mb-2">Descripción</label>
                <textarea name="descripcion" id="descripcion" rows="4"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    placeholder="Breve resumen del contenido del curso..."></textarea>
            </div>
            <div>
                <label for="maestro_id" class="block text-sm font-bold text-gray-700 mb-2">Maestro Titular</label>
                <select name="maestro_id" id="maestro_id" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-white">
                    <option value="" disabled selected>Seleccione un maestro...</option>
                    {% for maestro in maestros %}
                        <option value="{{ maestro.matricula }}">
                            {{ maestro.nombre }} {{ maestro.apellidos }} ({{ maestro.especialidad }})
                        </option>
                    {% endfor %}
                </select>
                <p class="mt-2 text-xs text-gray-400">Un curso pertenece a un solo maestro. </p>
            </div>
                <button type="submit"
                    class="px-6 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all transform hover:scale-105">
                    Guardar Curso
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
