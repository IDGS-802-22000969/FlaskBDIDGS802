{% extends "layout.html" %}
{% block container %}
{% import "_macros.html" as macros %}

<div class="py-10 max-w-2xl mx-auto px-4">
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900 text-center">Modificar Inscripción</h2>
        <p class="text-sm text-gray-500 text-center">Cambia al alumno de grupo o materia.</p>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl shadow-lg p-8">
        <form action="{{ url_for('inscripciones.inscripcionModificar', alumno_id=alumno.id, curso_id=curso_actual.id) }}" 
              method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="relative z-0 w-full mb-6 group">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Alumno Seleccionado</label>
                <input type="text" value="{{ alumno.nombre }} {{ alumno.apaterno }}" 
                    class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-200" 
                    readonly>
            </div>

            <div class="relative z-0 w-full mb-6 group">
                <label for="nuevo_curso_id" class="block mb-2 text-sm font-medium text-gray-700">Mover al Curso:</label>
                <select name="nuevo_curso_id" id="nuevo_curso_id" required
                    class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-200 focus:outline-none focus:border-indigo-600 peer">
                    {% for curso in cursos %}
                        <option value="{{ curso.id }}" {% if curso.id == curso_actual.id %}selected{% endif %}>
                            {{ curso.nombre }} — (Prof. {{ curso.maestro.nombre }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex flex-col gap-3">
                <button type="submit"
                   class="text-red-500 hover:text-red-700 text-xs font-bold uppercase">
                    Guardar Cambios
                </button>
                <a href="{{ url_for('inscripciones.inscripcionesTabla') }}" 
                   class="text-center py-2 text-sm text-gray-500 hover:underline">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
